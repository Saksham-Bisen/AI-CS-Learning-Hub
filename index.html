<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUCT | CS Foundations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --bg-color: #010805;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --mesh-opacity: 0.15;
            --accent: #22c55e;
            --cursor-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #f7faf9;
            --text-primary: #051610;
            --text-secondary: #3d5a4e;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(5, 22, 16, 0.1);
            --mesh-opacity: 0.35;
            --accent: #16a34a;
            --cursor-color: #051610;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            transition: background-color 0.4s ease;
            overflow-x: hidden; margin: 0; padding: 0;
        }
        .mono { font-family: 'Fira Code', monospace; }

        .mesh-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at var(--m-x, 50%) var(--m-y, 50%), rgba(34, 197, 94, var(--mesh-opacity)) 0%, transparent 45%), var(--bg-color);
            filter: blur(80px);
        }

        /* MOBILE FIX: Hide Rail and Cursor on small screens */
        #progress-rail { position: fixed; left: 20px; top: 0; width: 1px; height: 100vh; background: var(--glass-border); z-index: 50; }
        #progress-fill { width: 3px; background: var(--accent); position: absolute; top: 0; left: -1px; transition: height 0.2s; }
        
        #cursor, #cursor-follower { display: none; }
        @media (min-width: 768px) { 
            #cursor, #cursor-follower { display: block; position: fixed; pointer-events: none; z-index: 9999; }
            body { cursor: none; }
            #progress-rail { left: 40px; }
        }

        .liquid-glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(40px) saturate(200%); 
            border: 1px solid var(--glass-border); 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 2000; }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* MOBILE MODAL: Full width on small, capped on large */
        #popup-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%);
            width: 95%; max-width: 500px; opacity: 0; visibility: hidden;
            z-index: 2001; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            max-height: 90vh; overflow-y: auto;
        }
        #popup-window.active { transform: translate(-50%, -50%); opacity: 1; visibility: visible; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body onclick="startAudio()">

    <div id="cursor" class="bg-[var(--cursor-color)] w-2 h-2 rounded-full"></div>
    <div id="cursor-follower" class="border border-[var(--cursor-color)] w-10 h-10 rounded-full opacity-30"></div>
    <div class="mesh-bg"></div>
    <div id="progress-rail"><div id="progress-fill"></div></div>

    <nav class="fixed top-0 left-0 w-full z-[100] px-6 md:px-10 py-6 md:py-10 flex justify-between items-center">
        <div class="text-lg md:text-xl font-bold tracking-tighter uppercase italic flex items-center gap-2" style="color: var(--text-primary)">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> CS_BASE
        </div>
        <div class="flex items-center gap-4 md:gap-8">
            <div class="hidden sm:flex gap-6 md:gap-8 text-[9px] font-bold tracking-[0.3em] uppercase opacity-50">
                <a href="#core" style="color: var(--text-primary)">Construct</a>
                <a href="#vault" style="color: var(--text-primary)">Vault</a>
            </div>
            <button onclick="toggleTheme()" class="p-2 liquid-glass rounded-xl">
                <i id="theme-icon" data-lucide="moon" class="w-4 h-4 text-green-500"></i>
            </button>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="reveal active">
            <span class="text-[8px] md:text-[9px] font-bold tracking-[0.6em] uppercase text-green-500 mb-6 block animate-pulse">Master_Protocol // 2026</span>
            <h1 class="text-[18vw] md:text-[12vw] font-black tracking-tighter uppercase mb-6" style="color: var(--text-primary)">CONSTRUCT</h1>
            <p style="color: var(--text-secondary);" class="max-w-xl text-base md:text-lg mx-auto leading-relaxed px-4">
                Verify modules to construct your base.
            </p>
        </div>
    </section>

    <section id="core" class="max-w-7xl mx-auto py-10 md:py-20 px-6 md:px-10">
        <div id="card-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 md:gap-6"></div>
    </section>

    <section id="vault" class="max-w-7xl mx-auto py-20 md:py-32 px-6 md:px-10 reveal">
        <h2 class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4" style="color: var(--text-primary)">The <span class="text-green-500">Vault</span></h2>
        <div id="vault-nodes" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 md:gap-12"></div>
    </section>

    <section id="compiler" class="max-w-7xl mx-auto py-20 md:py-40 px-6 md:px-10 reveal">
        <h2 class="text-5xl md:text-6xl font-black uppercase tracking-tighter mb-12" style="color: var(--text-primary)">Sandbox</h2>
        <div class="liquid-glass relative rounded-[2rem] md:rounded-[3.5rem] p-1 overflow-hidden">
            <div class="h-[400px] md:h-[600px] relative bg-[#010805]">
                <iframe src="https://onecompiler.com/embed/python?theme=dark" width="100%" height="100%" frameborder="0" class="grayscale-[0.8] brightness-[0.9]"></iframe>
            </div>
        </div>
    </section>

    <footer class="py-32 md:py-64 text-center relative overflow-hidden">
        <div class="reveal">
            <div class="text-[25vw] md:text-[22vw] font-black tracking-tighter leading-none select-none italic opacity-10" style="color: var(--text-primary)">
                MIT-WPU
            </div>
        </div>
    </footer>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="popup-window" class="liquid-glass p-8 md:p-12 rounded-[2rem] md:rounded-[3.5rem]">
        <div id="popup-content"></div>
    </div>

    <script>
        const topics = {
            prog: { t: "Compile", i: "code", c: "green-400", list: ["Pointer Logic", "Memory Layout", "C++ Foundations"] },
            math: { t: "Logic", i: "hash", c: "blue-400", list: ["Boolean Algebra", "Graph Theory"] },
            dsa: { t: "Buffer", i: "layers", c: "yellow-400", list: ["B-Tree Indexing", "Dynamic Prog"] },
            web: { t: "Network", i: "globe", c: "orange-400", list: ["OSI Stack"] },
            ai: { t: "Neural", i: "brain", c: "red-500", list: ["Transformers"] }
        };

        let state = JSON.parse(localStorage.getItem('cs-construct-mobile-ready')) || {};

        function toggleTheme() {
            const b = document.documentElement;
            const isLight = b.getAttribute('data-theme') === 'light';
            b.setAttribute('data-theme', isLight ? 'dark' : 'light');
            document.getElementById('theme-icon').setAttribute('data-lucide', isLight ? 'moon' : 'sun');
            lucide.createIcons();
        }

        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor'), f = document.getElementById('cursor-follower');
            if(window.innerWidth >= 768 && c && f) {
                c.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                f.style.transform = `translate(${e.clientX-20}px, ${e.clientY-20}px)`;
            }
            document.documentElement.style.setProperty('--m-x', (e.clientX/window.innerWidth)*100+'%');
            document.documentElement.style.setProperty('--m-y', (e.clientY/window.innerHeight)*100+'%');
        });

        window.addEventListener('scroll', () => {
            const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const progress = (window.scrollY / h * 100);
            const fill = document.getElementById('progress-fill');
            if(fill) fill.style.height = progress + "%";
        });

        function draw() {
            const m = document.getElementById('card-container');
            const vNodes = document.getElementById('vault-nodes');
            
            if(m) {
                m.innerHTML = Object.keys(topics).map(k => {
                    const top = topics[k];
                    const categoryState = state[k] || {};
                    const activeDone = Object.keys(categoryState).filter(itemName => top.list.includes(itemName));
                    const p = top.list.length > 0 ? Math.round((activeDone.length / top.list.length) * 100) : 0;
                    return `<div onclick="openModal('${k}')" class="liquid-glass p-6 md:p-8 rounded-[2rem] reveal active hover:scale-105 cursor-pointer">
                        <div class="flex justify-between mb-4">
                            <i data-lucide="${top.i}" class="text-${top.c} w-5 h-5"></i>
                            <span class="mono text-[10px] font-bold" style="color: var(--text-secondary)">${p}%</span>
                        </div>
                        <h3 class="text-xs font-bold uppercase tracking-widest">${top.t}</h3>
                        <div class="mt-4 h-1 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-${top.c} transition-all duration-700" style="width:${p}%"></div>
                        </div>
                    </div>`;
                }).join('');
            }

            if(vNodes) {
                vNodes.innerHTML = Object.keys(topics).map(k => {
                    const top = topics[k], categoryState = state[k] || {};
                    return `<div class="space-y-6 reveal active">
                        <h4 class="text-[10px] font-bold tracking-[0.4em] text-${top.c} uppercase border-b border-white/5 pb-4">${top.t} Nodes</h4>
                        ${top.list.map(item => {
                            const isDone = categoryState[item];
                            return `<div class="liquid-glass p-5 rounded-2xl flex items-center justify-between group">
                                <span class="font-bold text-sm">${item}</span>
                                <button onclick="toggleItem('${k}','${item}')" class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center transition-all ${isDone ? 'bg-green-500 border-none' : 'hover:bg-white/5'}">
                                    ${isDone ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : '<i data-lucide="plus" class="w-4 h-4 opacity-30"></i>'}
                                </button>
                            </div>`;
                        }).join('')}
                    </div>`;
                }).join('');
            }
            lucide.createIcons();
        }

        function updateModalContent(k) {
            const t = topics[k], categoryState = state[k] || {};
            document.getElementById('popup-content').innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl md:text-4xl font-black uppercase tracking-tighter">${t.t}</h2>
                    <button onclick="closeModal()"><i data-lucide="x" class="opacity-30"></i></button>
                </div>
                <div class="space-y-2">${t.list.map(item => {
                    const isDone = categoryState[item];
                    return `<div onclick="toggleItem('${k}','${item}')" class="p-4 md:p-6 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center hover:bg-white/10 cursor-pointer transition-all">
                        <span class="${isDone ? 'opacity-20 line-through text-green-500' : ''}">${item}</span>
                        <div class="w-5 h-5 rounded-full flex items-center justify-center border ${isDone ? 'bg-green-500 border-none' : 'border-white/20'}">
                            ${isDone ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                        </div>
                    </div>`;
                }).join('')}</div>`;
            lucide.createIcons();
        }

        function openModal(k) { updateModalContent(k); document.getElementById('popup-window').classList.add('active'); document.getElementById('modal-overlay').classList.add('active'); }
        function closeModal() { document.getElementById('popup-window').classList.remove('active'); document.getElementById('modal-overlay').classList.remove('active'); }
        function toggleItem(k, i) { if(!state[k]) state[k] = {}; state[k][i] ? delete state[k][i] : state[k][i] = true; localStorage.setItem('cs-construct-mobile-ready', JSON.stringify(state)); draw(); if(document.getElementById('popup-window').classList.contains('active')) updateModalContent(k); }
        function startAudio() {}

        draw();
        const obs = new IntersectionObserver(e => e.forEach(x => x.isIntersecting && x.target.classList.add('active')), {threshold: 0.1});
        document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
    </script>
</body>
</html>
