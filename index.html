<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSTRUCT | CS Foundations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --bg-color: #010805;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --mesh-opacity: 0.15;
            --accent: #22c55e;
            --cursor-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #f7faf9;
            --text-primary: #051610;
            --text-secondary: #3d5a4e;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(5, 22, 16, 0.1);
            --mesh-opacity: 0.35;
            --accent: #16a34a;
            --cursor-color: #051610;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-primary);
            transition: background-color 0.4s ease;
            overflow-x: hidden; margin: 0; padding: 0;
            cursor: none;
        }
        .mono { font-family: 'Fira Code', monospace; }

        .mesh-bg { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at var(--m-x, 50%) var(--m-y, 50%), rgba(34, 197, 94, var(--mesh-opacity)) 0%, transparent 45%), var(--bg-color);
            filter: blur(80px);
        }

        /* Progress rail starts hidden */
#progress-rail { 
    position: fixed; 
    left: 40px; 
    top: 0; 
    width: 1px; 
    height: 100vh; 
    background: var(--glass-border); 
    z-index: 50; 
    opacity: 0; /* Hidden by default */
    transition: opacity 0.5s ease; /* Smooth fade in */
}

#progress-fill { 
    width: 3px; 
    background: var(--accent); 
    position: absolute; 
    top: 0; 
    left: -1px; 
    transition: height 0.2s; 
    box-shadow: 0 0 15px var(--accent); 
}
        #progress-fill { width: 3px; background: var(--accent); position: absolute; top: 0; left: -1px; transition: height 0.2s; box-shadow: 0 0 15px var(--accent); }

        #cursor { position: fixed; width: 8px; height: 8px; background: var(--cursor-color); border-radius: 50%; pointer-events: none; z-index: 9999; }
        #cursor-follower { position: fixed; width: 40px; height: 40px; border: 1px solid var(--cursor-color); opacity: 0.3; border-radius: 50%; pointer-events: none; z-index: 9998; transition: transform 0.12s ease-out; }

        .liquid-glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(40px) saturate(200%); 
            border: 1px solid var(--glass-border); 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 2000; }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }
        #popup-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%);
            width: 90%; max-width: 600px; opacity: 0; visibility: hidden;
            z-index: 2001; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #popup-window.active { transform: translate(-50%, -50%); opacity: 1; visibility: visible; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .scanlines::after {
            content: " "; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 20; background-size: 100% 4px; pointer-events: none; opacity: 0.2;
        }
    </style>
</head>
<body onclick="startAudio()">

    <div id="cursor"></div>
    <div id="cursor-follower"></div>
    <div class="mesh-bg"></div>
    <div id="progress-rail"><div id="progress-fill"></div></div>

    <nav class="fixed top-0 left-0 w-full z-[100] px-10 py-10 flex justify-between items-center">
        <div class="text-xl font-bold tracking-tighter uppercase italic flex items-center gap-2" style="color: var(--text-primary)">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div> CS_BASE
        </div>
        <div class="flex items-center gap-12">
            <div class="hidden md:flex gap-12 text-[10px] font-black tracking-[0.4em] uppercase opacity-60">
                <a href="#core" class="hover:text-green-500 transition-colors">Construct</a>
                <a href="#vault" class="hover:text-green-500 transition-colors">Vault</a>
                <a href="#compiler" class="hover:text-green-500 transition-colors">Sandbox</a>
            </div>
            <button onclick="toggleTheme()" class="p-2 liquid-glass rounded-xl hover:scale-110 transition-transform">
                <i id="theme-icon" data-lucide="moon" class="w-4 h-4 text-green-500"></i>
            </button>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="reveal active">
            <span class="text-[9px] font-bold tracking-[0.6em] uppercase text-green-500 mb-6 block animate-pulse">Master_Guide // 2026</span>
            <h1 class="text-[12vw] font-black tracking-tighter uppercase mb-6" style="color: var(--text-primary)">CONSTRUCT</h1>
            <p style="color: var(--text-secondary);" class="max-w-xl text-lg mx-auto leading-relaxed">
                Shaping the <span class="italic font-bold text-white">architectural foundations</span> of Computer Science. Verify modules to construct your base.
            </p>
        </div>
    </section>

    <section id="core" class="max-w-7xl mx-auto py-20 px-10">
        <div id="card-container" class="grid grid-cols-5 gap-6"></div>
    </section>

    <section id="vault" class="max-w-7xl mx-auto py-32 px-10 reveal">
        <div class="mb-24">
            <h2 class="text-8xl font-black uppercase tracking-tighter leading-none" style="color: var(--text-primary)">The <span class="text-green-500">Vault</span></h2>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-40 mt-4">Verified Study Nodes & Documentation</p>
        </div>
        <div id="vault-nodes" class="grid grid-cols-3 gap-12"></div>
    </section>
    
    <iframe id="sandbox-ide" src="https://onecompiler.com/embed/python?theme=dark" width="100%" height="100%" frameborder="0" class="grayscale-[0.8] brightness-[0.9]"></iframe>
    <section id="compiler" class="max-w-7xl mx-auto py-40 px-10 reveal">
        <div class="mb-16">
            <h2 class="text-6xl font-black uppercase tracking-tighter mb-4" style="color: var(--text-primary)">Sandbox</h2>
            <p style="color: var(--text-secondary);" class="uppercase tracking-widest text-[10px] font-bold">Execution Environment // Root Access</p>
        </div>
        <div class="liquid-glass relative rounded-[3.5rem] p-1 overflow-hidden scanlines">
            <div class="bg-[#051610] p-6 flex items-center justify-between border-b border-white/5">
                <div class="flex gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></div>
                </div>
                <div class="mono text-[9px] tracking-[0.3em] opacity-30 font-bold uppercase text-white">Root@mit-wpu_lab</div>
            </div>
            <div class="h-[600px] relative bg-[#010805]">
                <iframe src="https://onecompiler.com/embed/python?theme=dark" width="100%" height="100%" frameborder="0" class="grayscale-[0.8] brightness-[0.9]"></iframe>
            </div>
        </div>
    </section>

    <footer class="py-64 text-center relative overflow-hidden">
        <div class="reveal">
            <div class="text-[22vw] font-black tracking-tighter leading-none select-none italic opacity-20 transition-opacity duration-500" 
                 style="color: var(--text-primary)">
                MIT-WPU
            </div>
        </div>
    </footer>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="popup-window" class="liquid-glass p-12 rounded-[3.5rem]">
        <div id="popup-content"></div>
    </div>

    <script>
        const topics = {
            prog: { t: "Compile", i: "code", c: "green-400", list: [
                { n: "Pointer Logic", url: "https://en.cppreference.com/w/c/language/pointer", d: "Deep dive into C memory addresses." },
                { n: "Memory Layout", url: "https://osdev.org/Memory_Map_(x86)", d: "Exploring Stack, Heap, and physical mappings." },
                { n: "C++ Foundations", url: "https://isocpp.org/get-started", d: "High-performance architectural principles." }
            ]},
            math: { t: "Logic", i: "hash", c: "blue-400", list: [
                { n: "Boolean Algebra", url: "https://brilliant.org/wiki/boolean-algebra/", d: "The logic gates of modern computing." },
                { n: "Graph Theory", url: "https://www.youtube.com/watch?v=LFKZLXVO-ra", d: "3Blue1Brown's visual theory guide." }
            ]},
            dsa: { t: "Buffer", i: "layers", c: "yellow-400", list: [
                { n: "B-Tree Indexing", url: "https://neetcode.io/courses/advanced-dsa/0", d: "Structural indexing for database engines." },
                { n: "Dynamic Prog", url: "https://roadmap.sh/computer-science", d: "Optimizing overlapping sub-problems." }
            ]},
            web: { t: "Network", i: "globe", c: "orange-400", list: [{ n: "OSI Stack", url: "https://roadmap.sh/networking", d: "Connectivity hierarchy." }] },
            ai: { t: "Neural", i: "brain", c: "red-500", list: [{ n: "Transformers", url: "https://arxiv.org/abs/1706.03762", d: "The 'Attention' mechanism protocol." }] }
        };

        let state = JSON.parse(localStorage.getItem('cs-construct-v-final')) || {};

        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
        audio.loop = true; audio.volume = 0.05; 
        function startAudio() { audio.play(); }

        function toggleTheme() {
    const b = document.documentElement;
    const ide = document.getElementById('sandbox-ide');
    const isLight = b.getAttribute('data-theme') === 'light';
    
    // Toggle the main theme attribute
    const newTheme = isLight ? 'dark' : 'light';
    b.setAttribute('data-theme', newTheme);
    
    // Update the Lucide icon
    document.getElementById('theme-icon').setAttribute('data-lucide', isLight ? 'moon' : 'sun');
    
    // UPDATE THE IDE THEME
    if (ide) {
        // This swaps the URL parameter dynamically
        ide.src = `https://onecompiler.com/embed/python?theme=${newTheme}`;
    }

    lucide.createIcons();
}
        document.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor'), f = document.getElementById('cursor-follower');
            if(c && f) {
                c.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                f.style.transform = `translate(${e.clientX-20}px, ${e.clientY-20}px)`;
            }
            document.documentElement.style.setProperty('--m-x', (e.clientX/window.innerWidth)*100+'%');
            document.documentElement.style.setProperty('--m-y', (e.clientY/window.innerHeight)*100+'%');
        });

        window.addEventListener('scroll', () => {
    const rail = document.getElementById('progress-rail');
    const fill = document.getElementById('progress-fill');
    const scrollPos = window.scrollY;
    const totalHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    
    // Fade in the rail once the user scrolls down 10px
    if (scrollPos > 10) {
        rail.style.opacity = "1";
    } else {
        rail.style.opacity = "0";
    }

    // Update fill height
    const progress = (scrollPos / totalHeight * 100);
    if(fill) fill.style.height = progress + "%";
});

        function draw() {
            const m = document.getElementById('card-container');
            const v = document.getElementById('vault-nodes');
            
            if(m) {
                m.innerHTML = Object.keys(topics).map(k => {
                    const top = topics[k];
                    const categoryState = state[k] || {};
                    const activeDone = Object.keys(categoryState).filter(itemName => top.list.find(l => l.n === itemName));
                    const p = Math.round((activeDone.length / top.list.length) * 100);
                    return `<div onclick="openProgressModal('${k}')" class="liquid-glass p-8 rounded-[2.5rem] reveal active hover:scale-105 cursor-pointer">
                        <div class="flex justify-between mb-4">
                            <i data-lucide="${top.i}" class="text-${top.c} w-6 h-6"></i>
                            <span class="mono text-[10px] font-bold" style="color: var(--text-secondary)">${p}%</span>
                        </div>
                        <h3 class="text-xs font-bold uppercase tracking-widest">${top.t}</h3>
                        <div class="mt-4 h-1 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-${top.c} transition-all duration-700" style="width:${p}%"></div>
                        </div>
                    </div>`;
                }).join('');
            }

            if(v) {
                v.innerHTML = Object.keys(topics).map(k => {
                    const top = topics[k];
                    return `<div class="space-y-6 reveal active">
                        <h4 class="text-[10px] font-bold tracking-[0.4em] text-${top.c} uppercase border-b border-white/5 pb-4">${top.t} Nodes</h4>
                        ${top.list.map(node => `
                            <div onclick="openStudyModal('${k}', '${node.n}')" class="liquid-glass p-8 rounded-3xl group cursor-pointer hover:border-white/20 transition-all">
                                <h5 class="font-bold text-lg mb-1">${node.n}</h5>
                                <p class="text-[9px] opacity-40 uppercase tracking-widest">Study Documentation</p>
                            </div>
                        `).join('')}
                    </div>`;
                }).join('');
            }
            lucide.createIcons();
        }

        function openStudyModal(cat, name) {
            const item = topics[cat].list.find(n => n.n === name);
            const isVerified = state[cat] && state[cat][name];
            document.getElementById('popup-content').innerHTML = `
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="text-[10px] font-bold text-green-500 uppercase tracking-widest mb-2 block">Resource Node</span>
                        <h2 class="text-4xl font-black uppercase tracking-tighter">${item.n}</h2>
                    </div>
                    <button onclick="closeModal()"><i data-lucide="x" class="opacity-30"></i></button>
                </div>
                <div class="space-y-6 text-lg opacity-80 leading-relaxed">
                    <p>${item.d}</p>
                    <div class="p-6 bg-white/5 rounded-2xl border border-white/5">
                        <p class="text-sm font-bold mb-2">Verified Reference:</p>
                        <a href="${item.url}" target="_blank" class="text-green-500 break-all font-mono text-sm underline hover:text-green-400">${item.url}</a>
                    </div>
                </div>
                <div class="mt-10 pt-8 border-t border-white/5 flex gap-4">
                    <a href="${item.url}" target="_blank" class="bg-green-500 text-black font-bold uppercase text-[10px] px-8 py-4 rounded-full hover:scale-105 transition-transform inline-block">Access Material</a>
                    <button onclick="toggleVerify('${cat}', '${item.n}')" class="border border-white/10 text-white font-bold uppercase text-[10px] px-8 py-4 rounded-full hover:bg-white/5 transition-all">
                        ${isVerified ? 'Verified ✓' : 'Verify Mastery'}
                    </button>
                </div>`;
            showModal();
        }

        function openProgressModal(k) {
            const t = topics[k];
            const done = state[k] || {};
            document.getElementById('popup-content').innerHTML = `
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">${t.t} Mastery</h2>
                    <button onclick="closeModal()"><i data-lucide="x" class="opacity-30"></i></button>
                </div>
                <div class="space-y-2">${t.list.map(item => `
                    <div onclick="toggleVerify('${k}','${item.n}')" class="p-6 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center hover:bg-white/10 cursor-pointer transition-all">
                        <span class="${done[item.n] ? 'opacity-20 line-through text-green-500' : ''}">${item.n}</span>
                        <div class="w-5 h-5 rounded-full flex items-center justify-center border ${done[item.n] ? 'bg-green-500 border-none' : 'border-white/20'}">
                            ${done[item.n] ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                        </div>
                    </div>`).join('')}</div>`;
            showModal();
        }

        function toggleVerify(cat, name) {
            if(!state[cat]) state[cat] = {};
            state[cat][name] ? delete state[cat][name] : state[cat][name] = true;
            localStorage.setItem('cs-construct-v-final', JSON.stringify(state));
            draw(); 
            const h2 = document.querySelector('#popup-content h2');
            if(h2 && h2.innerText === name.toUpperCase()) openStudyModal(cat, name);
            else if(h2) openProgressModal(cat);
        }

        function showModal() { document.getElementById('popup-window').classList.add('active'); document.getElementById('modal-overlay').classList.add('active'); lucide.createIcons(); }
        function closeModal() { document.getElementById('popup-window').classList.remove('active'); document.getElementById('modal-overlay').classList.remove('active'); }

        draw();
        const obs = new IntersectionObserver(e => e.forEach(x => x.isIntersecting && x.target.classList.add('active')), {threshold: 0.1});
        document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
    </script>
</body>
</html>
